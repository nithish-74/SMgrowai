services:
  - type: web
    name: smgrowai-web
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smgrowai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: smgrowai-redis
          type: redis
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: smgrowai-web
          property: host
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          type: web
          name: smgrowai-web
          property: host

  - type: worker
    name: smgrowai-worker
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smgrowai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: smgrowai-redis
          type: redis
          property: connectionString

databases:
  - name: smgrowai-db
    databaseName: smgrowai
    user: smgrowai
    plan: starter

  - name: smgrowai-redis
    type: redis
    plan: starter
